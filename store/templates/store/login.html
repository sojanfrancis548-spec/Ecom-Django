{% extends 'base.html' %}
{% block content %}

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .luxe-page {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    overflow: hidden;
  }
  .bg-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid #c9a84c; opacity: 0.04; pointer-events: none;
  }
  .card {
    background: #0d0d0d; border: 1px solid #1a1a1a;
    border-radius: 2px; padding: 36px 40px;
    width: 100%; max-width: 400px; position: relative;
  }
  .card-corner { position: absolute; width: 14px; height: 14px; border-color: #c9a84c; border-style: solid; opacity: 0.5; }
  .cc-tl { top:-1px; left:-1px; border-width: 1px 0 0 1px; }
  .cc-tr { top:-1px; right:-1px; border-width: 1px 1px 0 0; }
  .cc-bl { bottom:-1px; left:-1px; border-width: 0 0 1px 1px; }
  .cc-br { bottom:-1px; right:-1px; border-width: 0 1px 1px 0; }
  .logo-ring-outer {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid #1c1c1c;
    border-top-color: #c9a84c; border-bottom-color: #8a6f2e;
    animation: lspin 2s linear infinite;
  }
  .logo-ring-mid {
    position: absolute; width: 42px; height: 42px;
    top: 7px; left: 7px; border-radius: 50%;
    border: 1px solid #111; border-right-color: #c9a84c;
    animation: lspinr 1.5s linear infinite;
  }
  .logo-inner {
    position: absolute; width: 30px; height: 30px;
    top: 13px; left: 13px; border-radius: 50%;
    background: #0a0a0a; border: 1px solid #2a2218;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #c9a84c; letter-spacing: 1px;
  }
  @keyframes lspin { to { transform: rotate(360deg); } }
  @keyframes lspinr { to { transform: rotate(-360deg); } }
  .brand-title { font-size: 22px; font-weight: 400; color: #e8d5a3; letter-spacing: 8px; margin-top: 14px; text-indent: 8px; }
  .div-line { height: 1px; width: 40px; background: #c9a84c; opacity: 0.35; }
  .div-diamond { width: 4px; height: 4px; background: #c9a84c; transform: rotate(45deg); opacity: 0.6; }
  .form-title { font-size: 9px; color: #7a6535; letter-spacing: 4px; margin-top: 6px; }
  .field-label { display: block; font-size: 9px; color: #4a4030; letter-spacing: 3px; margin-bottom: 6px; }
  .luxe-input {
    width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a;
    border-radius: 0; padding: 11px 14px; font-size: 13px;
    color: #c9a84c; outline: none; transition: border-color 0.3s;
    letter-spacing: 1px; margin-bottom: 16px;
  }
  .luxe-input:focus { border-color: #c9a84c; }
  .luxe-input::placeholder { color: #2a2218; }
  .luxe-btn {
    width: 100%; padding: 13px; background: #c9a84c;
    border: none; border-radius: 0; font-size: 10px;
    font-weight: 500; color: #0a0a0a; letter-spacing: 4px;
    cursor: pointer; transition: background 0.3s;
  }
  .luxe-btn:hover { background: #e8d5a3; }
  .link-text { text-align: center; font-size: 10px; color: #3a3020; letter-spacing: 2px; margin-top: 20px; }
  .gold-link { color: #c9a84c; text-decoration: none; border-bottom: 1px solid #c9a84c; padding-bottom: 1px; }
  .error-msg { background: #1a0a0a; border: 1px solid #4a1a1a; color: #c9a84c; font-size: 10px; letter-spacing: 2px; padding: 10px 14px; margin-bottom: 16px; }
</style>

<div class="luxe-page">
  <div class="bg-ring" style="width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
  <div class="bg-ring" style="width:350px;height:350px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>

  <div class="card">
    <div class="card-corner cc-tl"></div>
    <div class="card-corner cc-tr"></div>
    <div class="card-corner cc-bl"></div>
    <div class="card-corner cc-br"></div>

    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:28px;">
      <div style="position:relative;width:56px;height:56px;">
        <div class="logo-ring-outer"></div>
        <div class="logo-ring-mid"></div>
        <div class="logo-inner">L</div>
      </div>
      <div class="brand-title">LUXE</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <div class="div-line"></div>
        <div class="div-diamond"></div>
        <div class="div-line"></div>
      </div>
      <div class="form-title">WELCOME BACK</div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}" />
      <label class="field-label">EMAIL ADDRESS</label>
      <input class="luxe-input" type="email" name="email" placeholder="your@email.com" required />

      <label class="field-label">PASSWORD</label>
      <input class="luxe-input" type="password" name="password" placeholder="••••••••••" required />

      <div style="text-align:right;margin-top:-10px;margin-bottom:16px;">
        <a href="{% url 'password_reset' %}" class="gold-link" style="font-size:9px;letter-spacing:2px;">FORGOT PASSWORD?</a>
      </div>

      <button type="submit" class="luxe-btn">ENTER</button>
    </form>

    <div class="link-text">
      NEW TO LUXE? <a href="{% url 'register' %}" class="gold-link">CREATE ACCOUNT</a>
    </div>
  </div>
</div>

{% endblock %}
