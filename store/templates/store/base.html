{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LUXE Store{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --dark: #141210;
      --surface: #ffffff;
      --border: #e8e2d9;
      --accent: #c8a96e;
      --accent-dark: #a8893e;
      --text: #2a2520;
      --muted: #8a7e72;
      --light: #f2ede6;
      --radius: 4px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--dark);
      border-bottom: 1px solid rgba(200,169,110,.2);
      padding: 0 40px;
      display: flex;
      align-items: center;
      height: 64px;
      gap: 32px;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-right: auto;
    }

    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--accent); }

    .nav-search {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .nav-search input {
      background: transparent;
      border: none;
      outline: none;
      padding: 7px 12px;
      font-size: 12px;
      color: #fff;
      width: 160px;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-search input::placeholder { color: rgba(255,255,255,.3); }
    .nav-search button {
      background: transparent;
      border: none;
      border-left: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.5);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .cart-btn {
      position: relative;
      background: var(--accent);
      border: none;
      color: var(--dark);
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: background .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .cart-btn:hover { background: var(--accent-dark); }
    .cart-badge {
      background: var(--dark);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      background: var(--dark);
      color: #fff;
      padding: 14px 20px;
      border-radius: var(--radius);
      border-left: 3px solid var(--accent);
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Footer ── */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,.5);
      text-align: center;
      padding: 28px;
      font-size: 12px;
      letter-spacing: .08em;
      margin-top: 80px;
      border-top: 1px solid rgba(200,169,110,.15);
    }
    footer span { color: var(--accent); }

    /* ── Utilities ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .btn-dark { background: var(--dark); color: #fff; }
    .btn-dark:hover { background: #2a2520; }
    .btn-gold { background: var(--accent); color: var(--dark); }
    .btn-gold:hover { background: var(--accent-dark); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: .06em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 40px;
    }

    /* ── Product Card ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      cursor: pointer;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.08); }
    .product-img {
      width: 100%; height: 260px;
      object-fit: cover;
      display: block;
      background: var(--light);
    }
    .product-img-placeholder {
      width: 100%; height: 260px;
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      color: var(--border);
    }
    .product-info { padding: 18px 20px 20px; }
    .product-cat {
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .product-price {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .price-main { font-size: 17px; font-weight: 500; color: var(--text); }
    .price-old { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .price-badge {
      font-size: 10px;
      padding: 2px 7px;
      background: #fef3e2;
      color: #a8630a;
      border-radius: 20px;
      font-weight: 500;
    }
    .product-actions {
      padding: 0 20px 20px;
      display: flex;
      gap: 8px;
    }
    .product-actions .btn { flex: 1; justify-content: center; font-size: 11px; padding: 10px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="nav-logo">Luxe</a>
  <div class="nav-links">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'products' %}">Shop</a>
  </div>
  <form class="nav-search" action="{% url 'products' %}" method="GET">
    <input type="text" name="q" placeholder="Search products..." value="{{ request.GET.q }}"/>
    <button type="submit">⌕</button>
  </form>
  <a href="{% url 'cart' %}" class="cart-btn">
    🛍 Cart
    <span class="cart-badge" id="cart-badge">{{ cart_count }}</span>
  </a>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>© 2025 <span>LUXE</span> · Built with Django · All rights reserved</p>
</footer>

<div id="toast"></div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function addToCart(productId) {
    fetch(`/api/cart/add/${productId}/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        document.getElementById('cart-badge').textContent = data.cart_count;
        showToast('✓ ' + data.message);
      }
    });
  }

  function getCookie(name) {
    let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
