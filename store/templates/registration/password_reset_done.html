{% extends "base.html" %}
{% block content %}
<div class="container" style="padding: 48px 40px;">
  <div style="max-width:520px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;">
    <div class="section-title" style="font-size:28px;margin-bottom:6px;">Check your email</div>
    <div style="color:var(--muted);font-size:14px;line-height:1.7;">
      If an account exists for that email, we sent a password reset link.
    </div>
    <div style="margin-top:16px;">
      <a class="btn btn-outline" href="{% url 'home' %}">Return home</a>
    </div>
  </div>
</div>
{% endblock %}
