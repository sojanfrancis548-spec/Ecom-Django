{% extends "base.html" %}
{% block content %}
<div class="container" style="padding: 48px 40px;">
  <div style="max-width:520px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;">
    <div class="section-title" style="font-size:28px;margin-bottom:6px;">Set a new password</div>
    <div class="section-sub" style="margin-bottom:18px;">Choose something strong</div>

    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top:16px;">
          <button class="btn btn-gold" type="submit">Update password</button>
        </div>
      </form>
    {% else %}
      <div style="color:var(--muted);font-size:14px;line-height:1.7;">
        This reset link is invalid or has expired. Please request a new one.
      </div>
      <div style="margin-top:16px;">
        <a class="btn btn-outline" href="{% url 'password_reset' %}">Request new link</a>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
