{% extends "base.html" %}
{% block content %}
<div class="container" style="padding: 48px 40px;">
  <div style="max-width:520px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;">
    <div class="section-title" style="font-size:28px;margin-bottom:6px;">Reset password</div>
    <div class="section-sub" style="margin-bottom:18px;">Enter your email</div>

    {% if form.errors %}
      <div style="background:#fff4f4;border:1px solid #ffd0d0;color:#8a1f1f;padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;">
        Please correct the errors below.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:10px;">
        <label style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);">Email address</label>
        {{ form.email }}
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;align-items:center;">
        <button class="btn btn-gold" type="submit">Send reset link</button>
        <a class="btn btn-outline" href="{% url 'login' %}">Back to login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
